services:
  app:
    build: .
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - API_KEY=${API_KEY}
    depends_on:
      - redis
    volumes:
      - ./node_modules:/app/node_modules
      - ./src:/app/src:z

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  redis-data:
