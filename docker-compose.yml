services:
  app:
    build: .
    restart: always
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - API_KEY=${API_KEY}
      - APP_PORT=3000
    depends_on:
      - redis

  redis:
    image: redis:alpine
    restart: always
    ports:
      - "${REDIS_PORT:-6379}:6379"
    volumes:
      - redis-data:/data

volumes:
  redis-data:
