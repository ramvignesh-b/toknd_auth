services:
  app:
    build: .
    restart: always
    ports:
      - "${PORT:-3000}:3000"
    environment:
      - REDIS_URL=redis://redis:6379
      - API_KEY=${API_KEY}
    depends_on:
      - redis
    healthcheck:
      test: [ "CMD-SHELL", "curl -sf http://localhost:3000/health || exit 1" ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  redis:
    image: redis:alpine
    restart: always
    volumes:
      - redis-data:/data

volumes:
  redis-data:
