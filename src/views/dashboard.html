<!DOCTYPE html>
<html lang="en" data-theme="caramellatte">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auth Server Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5/themes.css" rel="stylesheet" type="text/css" />
    <script src="https://unpkg.com/@phosphor-icons/web@2.1.1"></script>
    <style>
        .font-mono {
            font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace;
        }

        .ph {
            font-size: 1.25rem;
            vertical-align: middle;
        }
    </style>
</head>

<body class="bg-base-200/50 min-h-screen font-sans antialiased text-base-content">
    <div class="navbar bg-base-100 shadow-sm px-4 md:px-8 border-b border-base-300">
        <div class="flex-1">
            <div class="flex items-center gap-2">
                <div
                    class="w-8 h-8 bg-primary rounded-lg flex items-center justify-center text-primary-content font-bold text-lg">
                    <i class="ph ph-shield-check"></i>
                </div>
                <a class="text-xl font-bold tracking-tight">Auth Server <span
                        class="text-xs font-normal opacity-50 ml-1">v1.0</span></a>
            </div>
        </div>
        <div class="flex-none">
            <div class="join shadow-sm border border-base-300">
                <div class="join-item bg-base-200 px-3 flex items-center border-r border-base-300">
                    <i class="ph ph-key opacity-70"></i>
                </div>
                <input type="password" id="apiKey" placeholder="Master API Key"
                    class="input join-item input-sm focus:outline-none w-32 md:w-64" />
            </div>
        </div>
    </div>

    <div class="container mx-auto p-4 md:p-8 max-w-7xl">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-8">
            <div class="card bg-base-100 shadow-xl border border-base-300 lg:col-span-4 self-start">
                <div class="card-body p-6">
                    <div class="flex items-center gap-2 mb-4">
                        <div class="w-2 h-6 bg-primary rounded-full"></div>
                        <h2 class="card-title text-xl font-bold">Configure Provider</h2>
                    </div>

                    <form id="configForm" class="space-y-4">
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Provider ID
                                    <div class="tooltip tooltip-top"
                                        data-tip="Internal name for this service. This will define your login URL (e.g. /auth/trakt/login).">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="text" id="providerName" placeholder="e.g. trakt" required
                                class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="divider text-xs opacity-50 my-2 uppercase tracking-widest text-[10px]">Credentials
                        </div>

                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Client ID
                                    <div class="tooltip tooltip-top"
                                        data-tip="Found in the 'API' or 'Developer' section of the provider. Sometimes called 'App ID' or 'Consumer Key'.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="text" id="clientId" placeholder="OAuth client id" required
                                class="input input-bordered w-full focus:input-primary" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Client Secret
                                    <div class="tooltip tooltip-top"
                                        data-tip="Found next to the Client ID. This is your private key—never share it or put it in client-side code.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="password" id="clientSecret" placeholder="OAuth client secret" required
                                class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="divider text-xs opacity-50 my-2 uppercase tracking-widest text-[10px]">Endpoints
                        </div>

                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Auth URL
                                    <div class="tooltip tooltip-top"
                                        data-tip="The page where users click 'Authorize'. Usually found in OAuth2 docs under 'Endpoints' or 'Authorize'.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="url" id="authUrl" placeholder="https://trakt.tv/oauth/authorize" required
                                class="input input-bordered w-full focus:input-primary" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Token URL
                                    <div class="tooltip tooltip-top"
                                        data-tip="The background API used to trade the code for a token. Usually ends in '/token' or '/access_token'.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="url" id="tokenUrl" placeholder="https://api.trakt.tv/oauth/token" required
                                class="input input-bordered w-full focus:input-primary" />
                        </div>
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Redirect URI
                                    <div class="tooltip tooltip-top"
                                        data-tip="Copy this URL and paste it into the 'Redirect URI' or 'Callback URL' field in your OAuth provider's settings.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <div class="relative group">
                                <input type="url" id="redirectUri" readonly
                                    class="input input-bordered w-full pr-12 focus:outline-none cursor-default opacity-80" />
                                <button type="button" onclick="copyRedirectUri()"
                                    class="btn btn-ghost btn-xs absolute right-2 top-1/2 -translate-y-1/2 text-base-content/40 hover:text-primary transition-colors">
                                    <i class="ph ph-copy text-sm"></i>
                                </button>
                            </div>
                            <label class="label py-0.5">
                                <span class="label-text-alt opacity-40 italic text-[10px]">Must match provider's
                                    callback URL</span>
                            </label>
                        </div>
                        <div class="form-control">
                            <label class="label py-1">
                                <span class="label-text font-semibold opacity-70 flex items-center gap-2">
                                    Scope
                                    <div class="tooltip tooltip-top"
                                        data-tip="Determines what data you're allowed to access. Multiple scopes are usually space-separated.">
                                        <i class="ph ph-info opacity-50 cursor-help"></i>
                                    </div>
                                </span>
                            </label>
                            <input type="text" id="scope" placeholder="public"
                                class="input input-bordered w-full focus:input-primary" />
                        </div>

                        <div class="card-actions pt-4">
                            <button type="submit" class="btn btn-primary w-full shadow-md">
                                <i class="ph ph-plus-bold mr-1"></i>
                                Save Configuration
                            </button>
                        </div>
                    </form>
                </div>
            </div>

            <div class="card bg-base-100 shadow-xl border border-base-300 lg:col-span-8 overflow-hidden">
                <div class="card-body p-0">
                    <div class="p-6 pb-4 flex justify-between items-center bg-base-100">
                        <div class="flex items-center gap-2">
                            <div class="w-2 h-6 bg-secondary rounded-full"></div>
                            <h2 class="card-title text-xl font-bold">Provider Registry</h2>
                        </div>
                        <button type="button" onclick="fetchProviders()" class="btn btn-sm btn-ghost border-base-300">
                            <i class="ph ph-arrows-clockwise mr-1"></i>
                            Refresh
                        </button>
                    </div>

                    <div class="overflow-x-auto">
                        <table class="table w-full">
                            <thead>
                                <tr class="bg-base-200/50">
                                    <th
                                        class="rounded-none font-bold uppercase tracking-wider text-[10px] opacity-60 px-6">
                                        Provider</th>
                                    <th class="font-bold uppercase tracking-wider text-[10px] opacity-60 px-6 w-1/3">
                                        Access
                                        Token</th>
                                    <th class="font-bold uppercase tracking-wider text-[10px] opacity-60 px-6 w-1/3">
                                        Refresh
                                        Token</th>
                                    <th
                                        class="font-bold uppercase tracking-wider text-[10px] opacity-60 px-6 whitespace-nowrap">
                                        Last Updated</th>
                                    <th
                                        class="rounded-none text-right font-bold uppercase tracking-wider text-[10px] opacity-60 px-1 w-px">
                                        Actions</th>
                                </tr>
                            </thead>
                            <tbody id="providerTableBody">
                                <tr>
                                    <td colspan="4" class="text-center py-20">
                                        <div class="flex flex-col items-center gap-3 opacity-30">
                                            <i class="ph ph-lock-key text-6xl"></i>
                                            <p class="font-medium">Enter Master API Key to access registry</p>
                                        </div>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="toast toast-end" id="notificationToast" style="display: none; z-index: 100;">
        <div class="alert shadow-lg border border-base-300">
            <span id="notificationMessage"></span>
        </div>
    </div>

    <script>
        const apiKeyInput = document.getElementById('apiKey');
        const configForm = document.getElementById('configForm');
        const redirectUriInput = document.getElementById('redirectUri');

        function setDefaultRedirectUri() {
            if (redirectUriInput) {
                redirectUriInput.value = `${window.location.origin}/auth/callback`;
            }
        }

        window.copyRedirectUri = () => {
            if (redirectUriInput) {
                navigator.clipboard.writeText(redirectUriInput.value).then(() => {
                    showNotification('Redirect URI copied!');
                });
            }
        };

        setDefaultRedirectUri();

        const providerTableBody = document.getElementById('providerTableBody');
        let providerData = {};
        let tokenStatus = {};

        function showNotification(message, type = 'success') {
            const toast = document.getElementById('notificationToast');
            const alert = toast.querySelector('.alert');
            const msgSpan = document.getElementById('notificationMessage');

            alert.className = `alert alert-${type} shadow-lg`;
            msgSpan.textContent = message;
            toast.style.display = 'block';

            setTimeout(() => {
                toast.style.display = 'none';
            }, 3000);
        }

        async function fetchProviders() {
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) return;

            try {
                // Fetch Configs
                const configRes = await fetch('/api/config', {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                if (!configRes.ok) throw new Error('Unauthorized or missing API Key');
                providerData = await configRes.json();

                // Fetch Token Status
                const statusRes = await fetch('/api/status', {
                    headers: { 'Authorization': `Bearer ${apiKey}` }
                });
                if (statusRes.ok) {
                    tokenStatus = await statusRes.json();
                }

                renderTable();
            } catch (error) {
                console.error('Error:', error);
                providerTableBody.innerHTML = `<tr><td colspan="4" class="text-center text-error py-12 font-medium">${error.message}</td></tr>`;
            }
        }

        function formatTimeAgo(dateString) {
            if (!dateString) return '<span class="opacity-30">Never</span>';
            const date = new Date(dateString);
            const now = new Date();
            const diffInSeconds = Math.floor((now - date) / 1000);

            if (diffInSeconds < 60) return 'Just now';
            if (diffInSeconds < 3600) return `${Math.floor(diffInSeconds / 60)}m ago`;
            if (diffInSeconds < 86400) return `${Math.floor(diffInSeconds / 3600)}h ago`;
            return date.toLocaleDateString();
        }

        function renderTable() {
            providerTableBody.innerHTML = '';
            const entries = Object.entries(providerData);

            if (entries.length === 0) {
                providerTableBody.innerHTML = '<tr><td colspan="5" class="text-center py-16 opacity-50 font-medium italic">No providers configured yet.</td></tr>';
                return;
            }

            for (const [name, config] of entries) {
                const status = tokenStatus[name] || { accessToken: null, refreshToken: null, lastUpdated: null };
                const row = document.createElement('tr');
                row.className = "hover:bg-base-200/30 transition-colors group";

                row.innerHTML = `
                    <td class="px-6 py-4">
                        <div class="flex flex-col">
                            <span class="font-bold text-base-content/90">${name}</span>
                            <span class="text-[10px] opacity-40 font-mono truncate max-w-[120px]" title="${config.clientId}">${config.clientId}</span>
                        </div>
                    </td>
                    <td class="px-6 py-4">${renderTokenCell(name, 'access', status.accessToken)}</td>
                    <td class="px-6 py-4">${renderTokenCell(name, 'refresh', status.refreshToken)}</td>
                    <td class="px-6 py-4">
                        <span class="text-xs font-medium opacity-60">${formatTimeAgo(status.lastUpdated)}</span>
                    </td>
                    <td class="px-6 py-4 text-right">
                        <div class="flex gap-2 justify-end opacity-0 group-hover:opacity-100 transition-opacity">
                            <a href="/auth/${name}/login" target="_blank" class="btn btn-xs btn-primary shadow-sm" title="Authenticate">
                                <i class="ph ph-link"></i> Connect
                            </a>
                            <button type="button" onclick="window.editProvider('${name}')" class="btn btn-xs btn-outline" title="Edit Config">
                                <i class="ph ph-pencil-simple"></i> Edit
                            </button>
                        </div>
                    </td>
                `;
                providerTableBody.appendChild(row);
            }
        }

        function renderTokenCell(provider, type, value) {
            if (!value) {
                return `<span class="badge badge-sm badge-ghost opacity-40 italic">Not Authed</span>`;
            }
            const id = `token-${provider}-${type}`;
            return `
                <div class="flex items-center gap-2">
                    <div class="relative flex items-center">
                        <input type="password" id="${id}" value="${value}" readonly
                            class="input input-xs bg-base-200/50 border-none font-mono text-[10px] w-24 pr-8 focus:outline-none" />
                        <button onclick="window.toggleToken('${id}')" class="absolute right-1 text-base-content/40 hover:text-primary transition-colors">
                            <i class="ph ph-eye-slash text-xs" id="eye-${id}"></i>
                        </button>
                    </div>
                    <button onclick="window.copyToken('${value}')" class="btn btn-square btn-ghost btn-xs text-base-content/40 hover:text-primary transition-colors">
                        <i class="ph ph-copy-simple"></i>
                    </button>
                </div>
            `;
        }

        window.toggleToken = (id) => {
            const input = document.getElementById(id);
            const eye = document.getElementById(`eye-${id}`);
            if (input.type === 'password') {
                input.type = 'text';
                eye.className = 'ph ph-eye text-xs';
            } else {
                input.type = 'password';
                eye.className = 'ph ph-eye-slash text-xs';
            }
        };

        window.copyToken = (value) => {
            navigator.clipboard.writeText(value).then(() => {
                showNotification('Token copied to clipboard!');
            }).catch(_err => {
                showNotification('Failed to copy token', 'error');
            });
        };

        window.editProvider = (name) => {
            const config = providerData[name];
            if (!config) return;

            document.getElementById('providerName').value = name;
            document.getElementById('clientId').value = config.clientId;
            document.getElementById('clientSecret').value = config.clientSecret;
            document.getElementById('authUrl').value = config.authUrl;
            document.getElementById('tokenUrl').value = config.tokenUrl;
            setDefaultRedirectUri();
            document.getElementById('scope').value = config.scope;

            document.getElementById('configForm').scrollIntoView({ behavior: 'smooth' });
            document.getElementById('providerName').focus();
        };

        configForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const apiKey = apiKeyInput.value.trim();
            if (!apiKey) {
                showNotification('Please enter your Master API Key', 'error');
                return;
            }

            const name = document.getElementById('providerName').value.trim();
            const config = {
                clientId: document.getElementById('clientId').value.trim(),
                clientSecret: document.getElementById('clientSecret').value.trim(),
                authUrl: document.getElementById('authUrl').value.trim(),
                tokenUrl: document.getElementById('tokenUrl').value.trim(),
                redirectUri: document.getElementById('redirectUri').value.trim() || undefined,
                scope: document.getElementById('scope').value.trim(),
            };

            try {
                const response = await fetch(`/api/config/${name}`, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                        'Authorization': `Bearer ${apiKey}`
                    },
                    body: JSON.stringify(config)
                });

                if (!response.ok) throw new Error(await response.text());

                showNotification('Configuration saved successfully!');
                fetchProviders();
                configForm.reset();
                setDefaultRedirectUri();
            } catch (error) {
                console.error('Error saving config:', error);
                showNotification(error.message, 'error');
            }
        });

        const savedApiKey = localStorage.getItem('auth_server_api_key');
        if (savedApiKey) {
            apiKeyInput.value = savedApiKey;
            fetchProviders();
        }

        apiKeyInput.addEventListener('input', () => {
            localStorage.setItem('auth_server_api_key', apiKeyInput.value);
            clearTimeout(window.fetchTimeout);
            window.fetchTimeout = setTimeout(fetchProviders, 500);
        });
    </script>
</body>

</html>
